# Secrets Manager初期登録（初回デプロイ前に実行）:
#
# [1] キー/値シークレット（Snowflake接続情報 + APIキー）
# aws secretsmanager create-secret --name claude-code-dashboard \
#   --region us-west-2 \
#   --secret-string '{
#     "snowflake_account": "NVQTVBO-JSB24064",
#     "snowflake_user": "CLAUDE_HOOK_USER",
#     "snowflake_database": "YOUR_DB",
#     "snowflake_warehouse": "COMPUTE_WH",
#     "api_key": "your-random-api-key"
#   }'
#
# [2] プレーンテキストシークレット（RSA秘密鍵 PEM）
# aws secretsmanager create-secret --name claude-code-dashboard/private-key \
#   --region us-west-2 \
#   --secret-string file://rsa_key.p8

version = 0.1

[default]
[default.global.parameters]
stack_name = "claude-code-dashboard"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-west-2"
